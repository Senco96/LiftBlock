<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftBlock - Planificación</title>
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 m-0 p-0">

    <div id="root"></div>

    <script type="text/babel">
        
        function LiftBlockApp() {
          // Estados para los RM principales
          const [squat, setSquat] = React.useState(250);
          const [bench, setBench] = React.useState(170);
          const [deadlift, setDeadlift] = React.useState(300);
          const [level, setLevel] = React.useState('avanzado');

          // Configuración de la progresión de 16 semanas
          const weeksConfig = [
            { week: 1, type: "Volumen", pS: 65, pB: 65, pD: 60 },
            { week: 2, type: "Volumen", pS: 70, pB: 70, pD: 65 },
            { week: 3, type: "Volumen", pS: 73, pB: 73, pD: 68 },
            { week: 4, type: "Descarga", pS: 60, pB: 60, pD: 60 },
            { week: 5, type: "Fuerza", pS: 75, pB: 75, pD: 70 },
            { week: 6, type: "Fuerza", pS: 78, pB: 78, pD: 73 },
            { week: 7, type: "Fuerza", pS: 82, pB: 82, pD: 77 },
            { week: 8, type: "Descarga", pS: 65, pB: 65, pD: 62 },
            { week: 9, type: "Intensidad", pS: 85, pB: 85, pD: 80 },
            { week: 10, type: "Intensidad", pS: 88, pB: 88, pD: 84 },
            { week: 11, type: "Intensidad", pS: 92, pB: 92, pD: 88 },
            { week: 12, type: "Descarga", pS: 70, pB: 70, pD: 65 },
            { week: 13, type: "Peaking", pS: 95, pB: 95, pD: 92 },
            { week: 14, type: "Peaking", pS: 98, pB: 98, pD: 96 },
            { week: 15, type: "Taper", pS: 75, pB: 75, pD: 70 },
            { week: 16, type: "Test RM", pS: 102, pB: 102, pD: 102 },
          ];

          const getAdjustedPercentage = (basePercentage, currentLevel, movement) => {
            let modifier = 0;
            if (currentLevel === 'principiante') modifier = -3;
            if (currentLevel === 'intermedio') modifier = 0;
            if (currentLevel === 'avanzado') modifier = 2;
            
            if (movement === 'deadlift' && basePercentage > 80) {
              modifier -= 1;
            }
            return basePercentage + modifier;
          };

          const roundToNearest25 = (weight) => {
            return Math.round(weight / 2.5) * 2.5;
          };

          return (
            <div className="min-h-screen p-4 md:p-8 font-sans">
              <header className="max-w-6xl mx-auto mb-8 border-b border-slate-800 pb-6">
                <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                  <div>
                    <h1 className="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">
                      LIFTBLOCK 🏋️‍♂️
                    </h1>
                    <p className="text-slate-400 text-sm mt-1">Planificación automatizada y cálculo de cargas v4</p>
                  </div>
                  
                  <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700 self-start">
                    <button onClick={() => setLevel('principiante')} className={`px-3 py-1 text-xs font-semibold rounded transition ${level === 'principiante' ? 'bg-amber-500 text-slate-950' : 'text-slate-400 hover:text-slate-200'}`}>Principiante</button>
                    <button onClick={() => setLevel('intermedio')} className={`px-3 py-1 text-xs font-semibold rounded transition ${level === 'intermedio' ? 'bg-amber-500 text-slate-950' : 'text-slate-400 hover:text-slate-200'}`}>Intermedio</button>
                    <button onClick={() => setLevel('avanzado')} className={`px-3 py-1 text-xs font-semibold rounded transition ${level === 'avanzado' ? 'bg-amber-500 text-slate-950' : 'text-slate-400 hover:text-slate-200'}`}>Avanzado</button>
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto space-y-8">
                <section className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-slate-800/60 p-5 rounded-xl border border-slate-700/50">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-sm font-medium text-slate-400 tracking-wider uppercase">Squat (SQ)</span>
                      <span>🟢</span>
                    </div>
                    <div className="flex items-baseline gap-2">
                      <input type="number" value={squat} onChange={(e) => setSquat(Number(e.target.value))} className="bg-transparent text-3xl font-bold font-mono text-white focus:outline-none w-28 border-b border-dashed border-slate-600 focus:border-amber-400" />
                      <span className="text-lg font-bold text-slate-500">kg</span>
                    </div>
                  </div>

                  <div className="bg-slate-800/60 p-5 rounded-xl border border-slate-700/50">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-sm font-medium text-slate-400 tracking-wider uppercase">Bench Press (BP)</span>
                      <span>🔵</span>
                    </div>
                    <div className="flex items-baseline gap-2">
                      <input type="number" value={bench} onChange={(e) => setBench(Number(e.target.value))} className="bg-transparent text-3xl font-bold font-mono text-white focus:outline-none w-28 border-b border-dashed border-slate-600 focus:border-amber-400" />
                      <span className="text-lg font-bold text-slate-500">kg</span>
                    </div>
                  </div>

                  <div className="bg-slate-800/60 p-5 rounded-xl border border-slate-700/50">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-sm font-medium text-slate-400 tracking-wider uppercase">Deadlift (DL)</span>
                      <span>🔴</span>
                    </div>
                    <div className="flex items-baseline gap-2">
                      <input type="number" value={deadlift} onChange={(e) => setDeadlift(Number(e.target.value))} className="bg-transparent text-3xl font-bold font-mono text-white focus:outline-none w-28 border-b border-dashed border-slate-600 focus:border-amber-400" />
                      <span className="text-lg font-bold text-slate-500">kg</span>
                    </div>
                  </div>
                </section>

                <section className="bg-slate-800/40 rounded-xl border border-slate-700/60 overflow-hidden">
                  <div className="p-5 border-b border-slate-700/60 flex items-center gap-2">
                    <span>📈</span>
                    <h2 className="text-lg font-bold text-white">Macrociclo de Progresión (16 Semanas)</h2>
                  </div>
                  
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-800 text-slate-300 text-xs font-bold uppercase tracking-wider border-b border-slate-700">
                          <th className="py-3 px-4 text-center w-16">Sem</th>
                          <th className="py-3 px-4 w-32">Fase / Enfoque</th>
                          <th className="py-3 px-4 text-center bg-emerald-950/20 text-emerald-400">Squat (% / kg)</th>
                          <th className="py-3 px-4 text-center bg-sky-950/20 text-sky-400">Bench (% / kg)</th>
                          <th className="py-3 px-4 text-center bg-rose-950/20 text-rose-400">Deadlift (% / kg)</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800 text-sm font-mono">
                        {weeksConfig.map((item) => {
                          const adjS = getAdjustedPercentage(item.pS, level, 'squat');
                          const adjB = getAdjustedPercentage(item.pB, level, 'bench');
                          const adjD = getAdjustedPercentage(item.pD, level, 'deadlift');

                          const weightS = roundToNearest25((squat * adjS) / 100);
                          const weightB = roundToNearest25((bench * adjB) / 100);
                          const weightD = roundToNearest25((deadlift * adjD) / 100);

                          const isDescarga = item.type === "Descarga" || item.type === "Taper";

                          return (
                            <tr key={item.week} className={`hover:bg-slate-700/30 transition ${isDescarga ? 'bg-slate-800/30 text-slate-400' : ''}`}>
                              <td className="py-3 px-4 text-center font-bold text-slate-400 border-r border-slate-800">{item.week}</td>
                              <td className="py-3 px-4 font-sans font-medium">
                                <span className={`inline-block px-2.5 py-0.5 rounded text-xs font-bold ${
                                  item.type === "Volumen" ? "bg-purple-950 text-purple-300 border border-purple-800" :
                                  item.type === "Fuerza" ? "bg-blue-950 text-blue-300 border border-blue-800" :
                                  item.type === "Intensidad" ? "bg-amber-950 text-amber-300 border border-amber-800" :
                                  item.type === "Peaking" ? "bg-red-950 text-red-300 border border-red-800" :
                                  "bg-slate-700 text-slate-300"
                                }`}>
                                  {item.type}
                                </span>
                              </td>
                              <td className="py-3 px-4 text-center bg-emerald-950/5 border-r border-slate-800">
                                <span className="text-xs text-slate-400">{adjS}%</span>
                                <div className="text-base font-bold text-emerald-400 mt-0.5">{weightS}<span className="text-xs font-normal text-slate-500 ml-0.5">kg</span></div>
                              </td>
                              <td className="py-3 px-4 text-center bg-sky-950/5 border-r border-slate-800">
                                <span className="text-xs text-slate-400">{adjB}%</span>
                                <div className="text-base font-bold text-sky-400 mt-0.5">{weightB}<span className="text-xs font-normal text-slate-500 ml-0.5">kg</span></div>
                              </td>
                              <td className="py-3 px-4 text-center bg-rose-950/5">
                                <span className="text-xs text-slate-400">{adjD}%</span>
                                <div className="text-base font-bold text-rose-400 mt-0.5">{weightD}<span className="text-xs font-normal text-slate-500 ml-0.5">kg</span></div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </section>
              </main>
            </div>
          );
        }

        // Le decimos a React dónde pintar el componente en el HTML
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<LiftBlockApp />);
    </script>
</body>
</html>
